name: Release to Market

on: workflow_dispatch

env:
  nugets-dir: nupkgs

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:

      - name: Download artifact via GitHub CLI
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the latest successful run ID
          $runId = gh run list --workflow "build-and-test.yml" --branch "${{ github.ref_name }}" --status success --limit 1 --json databaseId -q ".[0].databaseId"

          if ([string]::IsNullOrWhiteSpace($runId)) {
            Write-Error "Error: No successful runs found for build-and-test.yml on branch ${{ github.ref_name }}"
            exit 1
          }

          Write-Host "Found Run ID: $runId. Downloading artifacts..."

          # Download the artifact
          gh run download $runId --name Artifacts --repo ${{ github.repository }}

      - name: Read version from JSON
        shell: pwsh
        run: |
          # Parse the version using native PowerShell JSON conversion
          $json = Get-Content "version.json" -Raw | ConvertFrom-Json
          $version = $json.'nuget-version'

          if ([string]::IsNullOrWhiteSpace($version) -or $version -eq "null") {
            Write-Error "Error: Failed to read nuget-version from version.json"
            exit 1
          }

          # Write the version to the GitHub Environment file safely
          "NUGET_VERSION=$version" >> $env:GITHUB_ENV
          Write-Host "Parsed version: $version"

      - name: Publish Nugets to nuget.org
        shell: pwsh
        run: |
          # Find all .nupkg files and push them iteratively
          $packages = Get-ChildItem -Path "${{ env.nugets-dir }}" -Filter "*.nupkg"

          foreach ($pkg in $packages) {
            Write-Host "Publishing $($pkg.Name)..."
            dotnet nuget push "$($pkg.FullName)" -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_API_KEY }}
          }

      - name: Make Github Release via GitHub CLI
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract full paths of all nuget packages into an array
          $files = Get-ChildItem -Path "${{ env.nugets-dir }}" -Filter "*.nupkg" | Select-Object -ExpandProperty FullName

          # Create the release and attach the files
          gh release create "v${{ env.NUGET_VERSION }}" $files --title "v${{ env.NUGET_VERSION }}" --generate-notes --repo ${{ github.repository }}